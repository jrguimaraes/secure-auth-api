services:
    db:
        image: postgres:16
        container_name: secure_auth_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: app
            POSTGRES_PASSWORD: app
            POSTGRES_DB: secure_auth
        ports:
            - "5432:5432"
        volumes:
            - dbdata:/var/lib/postgresql/data

    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: secure_auth_api
        restart: unless-stopped
        depends_on:
            - db
        ports:
            - "3000:3000"
        env_file:
            - .env
        environment:
            DATABASE_URL: postgresql://app:app@db:5432/secure_auth?schema=public
        command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
    dbdata:
